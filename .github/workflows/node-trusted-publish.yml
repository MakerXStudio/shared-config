on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
      node-version:
        required: false
        type: string
        default: 24.x
      working-directory:
        required: false
        type: string
        default: '.'
      package-path:
        required: false
        type: string
        default: './dist/package.json'
      access:
        required: false
        type: string
        default: 'restricted' # 'public' or 'restricted'
      tag:
        required: false
        type: string
        default: ''

jobs:
  node-publish:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      id-token: write  # Required for OIDC

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Ensure NPM 11.5.1 or higher
        run: |
          CURRENT_NPM_VERSION=$(npm -v)
          REQUIRED_NPM_VERSION="11.5.1"
          if [ "$(printf '%s\n' "$REQUIRED_NPM_VERSION" "$CURRENT_NPM_VERSION" | sort -V | head -n1)" != "$REQUIRED_NPM_VERSION" ]; then
            echo "❌ Error: NPM version $CURRENT_NPM_VERSION does not meet the minimum requirement of $REQUIRED_NPM_VERSION"
            echo "Trusted publishing requires npm CLI version 11.5.1 or later."
            exit 1
          fi

      - run: npm ci --ignore-scripts

      - run: npm run prepare --if-present

      - run: npm run build

      - name: Publish (if version has been updated)
        uses: JS-DevTools/npm-publish@0fd2f4369c5d6bcfcde6091a7c527d810b9b5c3f # v4.1.5
        with:
          package: ${{ inputs.package-path }}
          access: ${{ inputs.access }}
          tag: ${{ inputs.tag }}