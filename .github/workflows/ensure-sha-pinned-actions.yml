name: Ensure SHA Pinned Actions

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_call:
    inputs:
      whitelist:
        description: 'Newline-separated list of allowed owners or repositories. Optional.'
        type: string
        required: false
        default: ''
      exemptions:
        description: 'Newline-separated list of owners or repositories exempt from SHA pinning. Optional.'
        type: string
        required: false
        default: ''
      dry_run:
        description: 'Set to `true` to show warnings instead of failing. Optional.'
        type: string
        required: false
        default: 'false'
      workflows-path:
        description: 'Path to workflows directory'
        type: string
        required: false
        default: '.github/workflows'
      actions-path:
        description: 'Path to actions directory'
        type: string
        required: false
        default: '.github/actions'

jobs:
  ensure-sha-pinned:
    name: Ensure SHA Pinned Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure SHA pinned actions
        uses: ./.github/actions/ensure-sha-pinned-actions
        with:
          whitelist: ${{ inputs.whitelist }}
          exemptions: ${{ inputs.exemptions }}
          dry_run: ${{ inputs.dry_run || 'true' }}
          workflows-path: ${{ inputs.workflows-path || '.github/workflows' }}
          actions-path: ${{ inputs.actions-path || '.github/actions' }}
