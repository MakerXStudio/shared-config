name: Ensure SHA Pinned Actions

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_call:
    inputs:
      allowlist:
        description: 'Newline-separated list of allowed owners or repositories. Optional.'
        type: string
        required: false
        default: ''
      exemptions:
        description: 'Newline-separated list of owners or repositories exempt from SHA pinning. Optional.'
        type: string
        required: false
        default: ''
      dry_run:
        description: 'Set to `true` to show warnings instead of failing. Optional.'
        type: string
        required: false
        default: 'false'
      workflows-path:
        description: 'Path to workflows directory'
        type: string
        required: false
        default: '.github/workflows'
      actions-path:
        description: 'Path to actions directory'
        type: string
        required: false
        default: '.github/actions'

permissions:
  contents: read
  pull-requests: write

jobs:
  ensure-sha-pinned:
    name: Ensure SHA Pinned Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure SHA pinned actions
        id: pinned-actions
        uses: makerxstudio/shared-config/.github/actions/ensure-sha-pinned-actions@332e464f2b340c06985960f71d63b79c3c61c025 # v1.2.1
        with:
          allowlist: ${{ inputs.allowlist }}
          exemptions: ${{ inputs.exemptions }}
          dry_run: ${{ inputs.dry_run || 'true' }}
          workflows-path: ${{ inputs.workflows-path || '.github/workflows' }}
          actions-path: ${{ inputs.actions-path || '.github/actions' }}

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- sha-pinned-actions-report -->';
            const body = `${marker}\n${process.env.ISSUES_MARKDOWN}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          ISSUES_MARKDOWN: ${{ steps.pinned-actions.outputs.issues-markdown }}
